name: Daily Backup

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  backup:
    uses: ericcarnold/franklin-infra/.github/workflows/backup.yml@main
    with:
      project_name: questionnaire
      db_name: questionnaire
    secrets:
      TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
      TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}
      FRANKLIN_SSH_KEY: ${{ secrets.FRANKLIN_SSH_KEY }}
      NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
