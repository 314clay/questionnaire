<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Questionnaire</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

  <div class="card" id="card" style="text-align: center;">
    <div class="question-label" id="label">Live Stream</div>
    <div class="question-text" id="question"></div>
    <div class="question-info" id="info"></div>

    <!-- Connection status -->
    <div class="ws-status connecting" id="ws-status">
      <span class="ws-dot"></span>
      <span class="ws-text">Connecting...</span>
    </div>

    <!-- Mic live indicator -->
    <div class="mic-live-area" id="mic-area">
      <div class="mic-live-btn" id="mic-btn">
        <div class="mic-live-ring"></div>
        <svg class="mic-live-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/>
          <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
        </svg>
      </div>
      <div class="mic-live-timer" id="mic-timer">0:00</div>
      <div class="mic-live-level" id="mic-level">Level: 0</div>
    </div>

    <!-- Button grid -->
    <div class="button-grid" id="grid"></div>
  </div>
  <div class="port-badge" id="port-badge"></div>

<script src="../audio-streamer.js"></script>
<script>
// --- Payload (injected by server) ---
const payload = {
  type: "live-stream",
  question: "Live Audio Control",
  extra_info: "Audio streams continuously while connected. Use buttons for concurrent input.",
  ws_url: "",
  buttons: [
    { label: "Mute", label_active: "MUTED", mode: "hold" },
    { label: "Mark Event", mode: "oneshot" },
    { label: "Flag", label_active: "FLAGGED", mode: "toggle" }
  ]
};

// --- Init ---
const port = location.pathname.split('/').filter(Boolean).pop() || '10010';
document.getElementById('port-badge').textContent = ':' + port;
document.getElementById('question').textContent = payload.question;
document.getElementById('info').textContent = payload.extra_info || '';

const statusEl = document.getElementById('ws-status');
const statusDot = statusEl.querySelector('.ws-dot');
const statusText = statusEl.querySelector('.ws-text');
const micBtn = document.getElementById('mic-btn');
const micTimer = document.getElementById('mic-timer');
const micLevel = document.getElementById('mic-level');
const gridEl = document.getElementById('grid');

let ws = null;
let reconnectDelay = 1000;
let heartbeatTimer = null;
let streamStartTime = 0;
let timerInterval = null;
let levelRaf = null;

// --- WebSocket ---
function setStatus(state, text) {
  statusEl.className = 'ws-status ' + state;
  statusText.textContent = text;
}

function connect() {
  setStatus('connecting', 'Connecting...');
  const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const wsUrl = payload.ws_url || `${wsProto}//${location.host}/ws/${port}`;
  ws = new WebSocket(wsUrl);

  ws.onopen = () => {
    reconnectDelay = 1000;
    setStatus('connected', 'Connected');

    // Send session start
    ws.send(JSON.stringify({
      type: 'session_start',
      port,
      mime_type: AudioStreamer.getMimeType(),
      timestamp: new Date().toISOString()
    }));

    // Start audio streaming
    startAudio();

    // Heartbeat
    heartbeatTimer = setInterval(() => {
      if (ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'ping' }));
      }
    }, 15000);
  };

  ws.onclose = () => {
    setStatus('disconnected', 'Disconnected');
    stopAudio();
    clearInterval(heartbeatTimer);

    // Reconnect with exponential backoff
    setTimeout(() => {
      reconnectDelay = Math.min(reconnectDelay * 2, 10000);
      connect();
    }, reconnectDelay);
  };

  ws.onerror = () => {
    // onclose will fire after this
  };

  ws.onmessage = (e) => {
    // Minimal: just handle ack/pong
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'ack') {
        console.log('Session:', msg.session_id);
      }
    } catch (_) {}
  };
}

// --- Audio ---
function formatTime(ms) {
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return m + ':' + String(sec).padStart(2, '0');
}

async function startAudio() {
  if (!AudioStreamer.supported) {
    micLevel.textContent = 'Mic not supported';
    return;
  }

  ws.send(JSON.stringify({ type: 'audio_start', timestamp: new Date().toISOString() }));

  const ok = await AudioStreamer.start(ws);
  if (!ok) {
    micLevel.textContent = 'Mic denied';
    return;
  }

  micBtn.classList.add('streaming');
  streamStartTime = Date.now();
  micTimer.textContent = '0:00';

  timerInterval = setInterval(() => {
    micTimer.textContent = formatTime(Date.now() - streamStartTime);
  }, 500);

  // Level metering
  function updateLevel() {
    const level = AudioStreamer.getLevel();
    micLevel.textContent = 'Level: ' + level;
    levelRaf = requestAnimationFrame(updateLevel);
  }
  levelRaf = requestAnimationFrame(updateLevel);
}

function stopAudio() {
  AudioStreamer.stop();
  micBtn.classList.remove('streaming');

  if (timerInterval) {
    clearInterval(timerInterval);
    timerInterval = null;
  }
  if (levelRaf) {
    cancelAnimationFrame(levelRaf);
    levelRaf = null;
  }
}

// --- Buttons ---
function sendEvent(data) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(data));
  }
  console.log('Event:', JSON.stringify(data, null, 2));
}

const toggleState = {};

payload.buttons.forEach((btnDef, i) => {
  const btn = document.createElement('button');
  btn.className = 'grid-btn';
  btn.textContent = btnDef.label;

  if (btnDef.mode === 'hold') {
    let isActive = false;

    function activate() {
      if (isActive) return;
      isActive = true;
      btn.classList.add('active');
      btn.textContent = btnDef.label_active || btnDef.label;
      sendEvent({
        type: 'button_event', button_index: i, button_label: btnDef.label,
        mode: 'hold', active: true, timestamp: new Date().toISOString()
      });
    }

    function deactivate() {
      if (!isActive) return;
      isActive = false;
      btn.classList.remove('active');
      btn.textContent = btnDef.label;
      sendEvent({
        type: 'button_event', button_index: i, button_label: btnDef.label,
        mode: 'hold', active: false, timestamp: new Date().toISOString()
      });
    }

    btn.addEventListener('mousedown', (e) => { e.preventDefault(); activate(); });
    btn.addEventListener('mouseup', deactivate);
    btn.addEventListener('mouseleave', deactivate);
    btn.addEventListener('touchstart', (e) => { e.preventDefault(); activate(); }, { passive: false });
    btn.addEventListener('touchend', (e) => { e.preventDefault(); deactivate(); });
    btn.addEventListener('touchcancel', deactivate);
    btn.addEventListener('contextmenu', (e) => e.preventDefault());

  } else if (btnDef.mode === 'toggle') {
    toggleState[i] = false;

    btn.addEventListener('click', () => {
      toggleState[i] = !toggleState[i];
      btn.classList.toggle('active', toggleState[i]);
      btn.textContent = toggleState[i] ? (btnDef.label_active || btnDef.label) : btnDef.label;
      sendEvent({
        type: 'button_event', button_index: i, button_label: btnDef.label,
        mode: 'toggle', active: toggleState[i], timestamp: new Date().toISOString()
      });
    });

  } else {
    // oneshot
    btn.addEventListener('click', () => {
      btn.classList.add('fired');
      sendEvent({
        type: 'button_event', button_index: i, button_label: btnDef.label,
        mode: 'oneshot', timestamp: new Date().toISOString()
      });
    });
  }

  gridEl.appendChild(btn);
});

// --- Start ---
connect();
</script>
</body>
</html>
